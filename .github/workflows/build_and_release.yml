name: build_and_release

on:
  schedule:
    - cron: '06 11 * * *'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git python3-pip patchelf fakeroot gettext
          sudo -H pip3 install --upgrade pip setuptools setuptools-scm
          sudo -H pip3 install appimage-builder
          arch=$(uname -m)
          sudo wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${arch}.AppImage -O /usr/bin/appimagetool
          sudo chmod +x /usr/bin/appimagetool


      - name: Check latest CHIRP version and compare with latest release
        id: check_version
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest version from archive.chirpmyradio.com
          LATEST_DIR=$(curl -sL -H "User-Agent: goldstar611" "https://archive.chirpmyradio.com/chirp_next/" | grep -o 'href="next-[^/]*/"' | grep -o 'next-[^/]*' | sort -r | head -1)
          echo "Latest version directory: ${LATEST_DIR}"

          # Extract version number
          CHIRP_VERSION=${LATEST_DIR#next-}
          echo "CHIRP version: ${CHIRP_VERSION}"

          # Save for later steps
          echo "VER_WITH_NEXT=$LATEST_DIR" >> $GITHUB_ENV
          echo "CHIRP_VERSION=$CHIRP_VERSION" >> $GITHUB_ENV

          # Get the latest release tag from GitHub
          set +e
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null)
          echo "Latest GitHub release tag: ${LATEST_RELEASE}"

          if [ -z "${LATEST_RELEASE}" ]; then
            echo "No previous releases found. Proceeding with build."
            echo "RELEASE_EXISTS=false" >> $GITHUB_ENV
          elif [ "${LATEST_DIR}" = "${LATEST_RELEASE}" ]; then
            echo "Latest CHIRP version (${LATEST_DIR}) matches latest release (${LATEST_RELEASE}). No new version. Skipping build."
            echo "RELEASE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "New CHIRP version detected: ${LATEST_DIR} (previous: ${LATEST_RELEASE}). Proceeding with build."
            echo "RELEASE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Build AppImage
        if: ${{ env.RELEASE_EXISTS == 'false' }}
        run: |
          chmod +x ./build_local.sh
          ./build_local.sh

      - name: Release
        if: ${{ env.RELEASE_EXISTS == 'false' }}
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          artifacts=Chirp-*.AppImage
          tag="${{ env.VER_WITH_NEXT }}"

          gh release create --latest ${tag} -t ${tag} ${artifacts} --notes ""



